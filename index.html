<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌸 Cute Calc</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4ec, #f3e5f5);
      font-family: 'Segoe UI', sans-serif;
    }

    .calculator {
      background: #fff0f6;
      border-radius: 28px;
      padding: 24px;
      box-shadow: 0 8px 32px rgba(244, 143, 177, 0.3);
      width: 320px;
    }

    h2 {
      text-align: center;
      color: #c2185b;
      font-size: 20px;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    #display {
      width: 100%;
      background: #ffe4f0;
      border: 2px solid #f48fb1;
      border-radius: 14px;
      padding: 14px 16px;
      font-size: 28px;
      text-align: right;
      color: #7a4060;
      outline: none;
      margin-bottom: 16px;
    }

    #history {
      font-size: 12px;
      color: #c48fa0;
      text-align: right;
      min-height: 18px;
      margin-bottom: 6px;
      padding-right: 4px;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }

    button {
      padding: 18px 0;
      font-size: 20px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: transform 0.1s, background 0.15s;
      background: #fce4ec;
      color: #7a4060;
      box-shadow: 0 3px 8px rgba(244, 143, 177, 0.2);
    }

    button:hover  { background: #f8bbd0; transform: translateY(-2px); }
    button:active { transform: scale(0.93); }

    button.operator {
      background: #e1bee7;
      color: #6a1b9a;
    }
    button.operator:hover { background: #ce93d8; }

    button.equals {
      background: #f48fb1;
      color: white;
    }
    button.equals:hover { background: #f06292; }

    button.clear {
      background: #ff8fab;
      color: white;
    }
    button.clear:hover { background: #ff6b8a; }

    button.zero { grid-column: span 2; }
  </style>
</head>
<body>
  <div class="calculator">
    <h2>🌸 cute calc 🌸</h2>
    <div id="history"></div>
    <input id="display" type="text" readonly placeholder="0" />
    <div class="buttons">
      <button class="clear"    onclick="press('C')">🗑️</button>
      <button class="operator" onclick="press('back')">⌫</button>
      <button class="operator" onclick="press('%')">%</button>
      <button class="operator" onclick="press('/')">➗</button>

      <button onclick="press('7')">7</button>
      <button onclick="press('8')">8</button>
      <button onclick="press('9')">9</button>
      <button class="operator" onclick="press('*')">✖️</button>

      <button onclick="press('4')">4</button>
      <button onclick="press('5')">5</button>
      <button onclick="press('6')">6</button>
      <button class="operator" onclick="press('-')">➖</button>

      <button onclick="press('1')">1</button>
      <button onclick="press('2')">2</button>
      <button onclick="press('3')">3</button>
      <button class="operator" onclick="press('+')">➕</button>

      <button class="zero" onclick="press('0')">0</button>
      <button onclick="press('.')">🌸</button>
      <button class="equals"   onclick="press('=')">🟰</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');
    const history = document.getElementById('history');

    function press(val) {
      if (val === 'C') {
        display.value = '';
        history.textContent = '';
      } else if (val === 'back') {
        display.value = display.value.slice(0, -1);
      } else if (val === '=') {
        try {
          const expr = display.value;
          const result = Function('"use strict"; return (' + expr + ')')();
          history.textContent = expr + ' =';
          display.value = result;
        } catch {
          display.value = '💔 Error';
        }
      } else {
        display.value += val;
      }
    }

    document.addEventListener('keydown', (e) => {
      const map = { Enter: '=', Backspace: 'back', Escape: 'C' };
      const allowed = '0123456789.+-*/%';
      if (map[e.key]) press(map[e.key]);
      else if (allowed.includes(e.key)) press(e.key);
    });
  </script>
</body>
</html>
